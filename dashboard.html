<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rise Craft Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/theme.css">

    <link rel="stylesheet" href="assets/css/app.css">

</head>

<body>

<div class="layout">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h3 class="mb-4 text-center">

            Rise Craft

        </h3>

        <div class="list-group">

            <a href="dashboard.html" class="list-group-item list-group-item-action active">

                <i class="bi bi-speedometer2"></i>

                Dashboard

            </a>

            <a href="recipes.html" class="list-group-item list-group-item-action">

                <i class="bi bi-box"></i>

                Recipes

            </a>

        </div>

        <hr>

        <h6 class="text-secondary mt-4">

            Craft Professions

        </h6>

        <div id="professionMenu" class="list-group mt-2">

        </div>

    </aside>

    <!-- Content -->

    <main class="content">

        <div class="topbar">

            <h4>Dashboard</h4>

        </div>

        <div class="container-fluid mt-4">

            <div class="row g-4">

                <div class="col-md-4">

                    <div class="stat-card">

                        <h5>Content Version</h5>

                        <h2 id="contentVersion">0</h2>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="stat-card">

                        <h5>Recipe Version</h5>

                        <h2 id="recipeVersion">0</h2>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="stat-card">

                        <h5>Material Version</h5>

                        <h2 id="materialVersion">0</h2>

                    </div>

                </div>

            </div>

        </div>

    </main>

</div>

<script src="assets/js/config.js"></script>

<script src="assets/js/services/github.service.js"></script>

<script src="assets/js/services/manifest.service.js"></script>

<script src="assets/js/services/profession.service.js"></script>

<script src="assets/js/services/recipe.service.js"></script>

<script src="assets/js/app.js"></script>

<script src="assets/js/sidebar.js"></script>

<script src="assets/js/dashboard.js"></script>

</body>

</html>
