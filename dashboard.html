<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rise Craft Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/app.css">

</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <h3 class="text-center mb-4">
            Rise Craft
        </h3>

        <div class="list-group">

            <a href="dashboard.html"
               class="list-group-item list-group-item-action active">

                <i class="bi bi-speedometer2"></i>
                Dashboard

            </a>

            <a href="recipes.html"
               class="list-group-item list-group-item-action">

                <i class="bi bi-box"></i>
                Recipes

            </a>

        </div>

        <hr>

        <h6 class="text-secondary">
            Craft Professions
        </h6>

        <div id="professionMenu"
             class="list-group mt-3">

        </div>

    </aside>

    <main class="content">

        <div class="topbar d-flex justify-content-between align-items-center">

            <h4 class="mb-0">
                Dashboard
            </h4>

            <div>

                <span class="badge bg-warning text-dark fs-6">

                    Draft

                    <span id="draftBadge">
                        0
                    </span>

                </span>

            </div>

        </div>

        <div class="container-fluid mt-4">

            <div class="row g-4">

                <div class="col-lg-4">

                    <div class="stat-card">

                        <h6>Content Version</h6>

                        <h2 id="contentVersion">0</h2>

                    </div>

                </div>

                <div class="col-lg-4">

                    <div class="stat-card">

                        <h6>Recipe Version</h6>

                        <h2 id="recipeVersion">0</h2>

                    </div>

                </div>

                <div class="col-lg-4">

                    <div class="stat-card">

                        <h6>Material Version</h6>

                        <h2 id="materialVersion">0</h2>

                    </div>

                </div>

                <div class="col-lg-6">

                    <div class="stat-card">

                        <h6>Total Recipes</h6>

                        <h2 id="recipeCount">0</h2>

                    </div>

                </div>

                <div class="col-lg-6">

                    <div class="stat-card">

                        <h6>Professions</h6>

                        <h2 id="professionCount">0</h2>

                    </div>

                </div>

            </div>

        </div>

    </main>

</div>

<script src="assets/js/config.js"></script>

<script src="assets/js/store/state.js"></script>

<script src="assets/js/services/auth.service.js"></script>
<script src="assets/js/services/github.service.js"></script>
<script src="assets/js/services/manifest.service.js"></script>
<script src="assets/js/services/profession.service.js"></script>
<script src="assets/js/services/recipe.service.js"></script>
<script src="assets/js/services/publish.service.js"></script>

<script src="assets/js/components/sidebar.js"></script>
<script src="assets/js/components/navbar.js"></script>

<script src="assets/js/pages/dashboard.js"></script>

</body>

</html>
