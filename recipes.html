<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rise Craft Studio - Recipes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Projedeki Mevcut CSS Dosyaları -->
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/app.css">
</head>

<body>

<div class="app">

    <!-- MOBILE MENU -->
    <nav class="navbar navbar-dark d-lg-none top-mobile">
        <div class="container-fluid">
            <button class="btn btn-outline-warning"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#sidebar">
                <i class="bi bi-list"></i>
            </button>

            <span class="navbar-brand mb-0">
                Rise Craft Studio
            </span>

            <button id="publishButton" class="btn btn-warning">
                <i class="bi bi-cloud-upload"></i>
                <span id="draftBadge">0</span>
            </button>
        </div>
    </nav>

    <!-- SIDEBAR -->
    <div class="offcanvas-lg offcanvas-start sidebar" tabindex="-1" id="sidebar">
        <div class="offcanvas-header">
            <h4 class="text-warning">Rise Craft Studio</h4>
            <button class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body p-0">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="bi bi-shield-fill"></i>
                </div>
                <h3>Rise Craft</h3>
                <p>Admin Studio</p>
            </div>

            <div class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i class="bi bi-speedometer2"></i>
                    Dashboard
                </a>
                <a href="recipes.html" class="menu-item active">
                    <i class="bi bi-box-seam"></i>
                    Recipes
                </a>
                <hr>
                <h6 class="menu-title">CRAFT PROFESSIONS</h6>
                <div id="professionMenu"></div>
            </div>

            <div class="sidebar-footer">
                <div class="github-status">
                    <span class="dot"></span>
                    GitHub Connected
                </div>
            </div>
        </div>
    </div>

    <!-- CONTENT -->
    <main class="content">
        <header class="topbar">
            <div>
                <h2>Recipes</h2>
                <p>Manage and edit recipes</p>
            </div>

            <div class="top-actions">
                <a href="editor.html" class="btn btn-warning">
                    <i class="bi bi-plus-lg"></i>
                    New Recipe
                </a>
            </div>
        </header>

        <section class="container-fluid">
            <!-- SEARCH & FILTER BAR (Eksik Olan Alan) -->
            <div class="panel-card mb-4">
                <div class="row g-3">
                    <div class="col-md-8">
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-secondary">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" 
                                   id="searchInput" 
                                   class="form-control bg-dark text-white border-secondary" 
                                   placeholder="Search recipes by name or ID...">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <select id="professionFilter" class="form-select bg-dark text-white border-secondary">
                            <option value="">All Professions</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- RECIPES TABLE -->
            <div class="panel-card">
                <div class="table-responsive">
                    <table class="table table-dark table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Recipe ID</th>
                                <th>Name</th>
                                <th>Profession</th>
                                <th>Level</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="recipeTableBody">
                            <!-- JS dinamik dolduracak -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="assets/js/config.js"></script>
<script src="assets/js/store/state.js"></script>

<script src="assets/js/services/auth.service.js"></script>
<script src="assets/js/services/github.service.js"></script>
<script src="assets/js/services/manifest.service.js"></script>
<script src="assets/js/services/profession.service.js"></script>
<script src="assets/js/services/recipe.service.js"></script>
<script src="assets/js/services/publish.service.js"></script>

<script src="assets/js/components/sidebar.js"></script>
<script src="assets/js/components/navbar.js"></script>
<script src="assets/js/components/recipe-table.js"></script>

<script src="assets/js/pages/recipes.js"></script>

</body>
</html>
