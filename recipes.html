<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rise Craft Studio - Recipes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/layout.css">
</head>
<body>

<div class="app">

    <!-- MOBILE NAVBAR -->
    <nav class="navbar navbar-dark d-lg-none top-mobile border-bottom">
        <div class="container-fluid px-3">
            <button class="btn btn-outline-warning" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
                <i class="bi bi-list"></i>
            </button>
            <span class="navbar-brand mb-0 h1 fs-6">Recipes</span>
            <button id="publishButton" class="btn btn-warning btn-sm fw-bold">
                <i class="bi bi-cloud-upload"></i>
                <span id="draftBadge" class="badge text-bg-dark ms-1">0</span>
            </button>
        </div>
    </nav>

    <!-- SIDEBAR -->
    <div class="offcanvas-lg offcanvas-start sidebar" tabindex="-1" id="sidebar">
        <div class="offcanvas-header border-bottom">
            <h5 class="text-warning mb-0 fs-6">Rise Craft Studio</h5>
            <button class="btn-close btn-close-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebar"></button>
        </div>

        <div class="offcanvas-body p-0 flex-column d-flex h-100">
            <div class="sidebar-header p-3 text-center border-bottom">
                <div class="logo mb-2">
                    <i class="bi bi-shield-fill fs-2 text-warning"></i>
                </div>
                <h5 class="mb-0">Rise Craft</h5>
                <small class="text-secondary">Admin Studio</small>
            </div>

            <div class="sidebar-menu p-3 flex-grow-1">
                <a href="dashboard.html" class="menu-item d-block p-2 text-decoration-none rounded mb-1">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
                <a href="recipes.html" class="menu-item active d-block p-2 text-decoration-none rounded mb-1">
                    <i class="bi bi-box-seam me-2"></i>Recipes
                </a>
                <hr class="my-3">
                <h6 class="menu-title text-uppercase fs-7 text-secondary px-2">CRAFT PROFESSIONS</h6>
                <div id="professionMenu"></div>
            </div>

            <div class="sidebar-footer p-3 border-top">
                <div class="github-status d-flex align-items-center fs-7">
                    <span class="dot bg-success rounded-circle me-2" style="width: 8px; height: 8px;"></span>
                    GitHub Connected
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="content p-3 p-md-4">
        <header class="topbar d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3 mb-4">
            <div>
                <h2 class="h4 mb-1"><i class="bi bi-box-seam text-warning me-2"></i>Recipes</h2>
                <small class="text-secondary">Rise Craft Companion Data Manager</small>
            </div>

            <div class="d-flex flex-wrap align-items-center gap-2">
                <a href="editor.html" class="btn btn-warning fw-semibold btn-sm fs-6 px-3">
                    <i class="bi bi-plus-lg me-1"></i> New Recipe
                </a>
                <button id="publishButtonDesktop" class="btn btn-outline-warning btn-sm fs-6 px-3 d-none d-lg-inline-block">
                    <i class="bi bi-cloud-upload me-1"></i> Publish
                    <span id="draftBadgeDesktop" class="badge text-bg-warning ms-1">0</span>
                </button>
            </div>
        </header>

        <section class="container-fluid p-0">
            <!-- FILTERS / SEARCH -->
            <div class="card p-3 mb-4 border rounded">
                <div class="row g-3">
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-search"></i></span>
                            <input type="text" id="searchInput" class="form-control" placeholder="Search recipe name or ID...">
                        </div>
                    </div>
                    <div class="col-12 col-md-6 col-lg-4">
                        <select id="professionFilter" class="form-select">
                            <option value="">All Professions</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- TABLE CONTAINER WITH RESPONSIVE WRAPPER -->
            <div class="card border rounded p-0 overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Level</th>
                                <th>Profession</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="recipeTableBody">
                            <tr>
                                <td colspan="5" class="text-center py-4 text-secondary">
                                    Yükleniyor...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/store/state.js"></script>
<script src="assets/js/services/auth.service.js"></script>
<script src="assets/js/services/github.service.js"></script>
<script src="assets/js/services/manifest.service.js"></script>
<script src="assets/js/services/profession.service.js"></script>
<script src="assets/js/services/recipe.service.js"></script>
<script src="assets/js/services/publish.service.js"></script>
<script src="assets/js/components/sidebar.js"></script>
<script src="assets/js/components/navbar.js"></script>
<script src="assets/js/components/recipe-table.js"></script>
<script src="assets/js/pages/recipes.js"></script>

</body>
</html>
