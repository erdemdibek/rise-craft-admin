<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Recipe Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/theme.css">

    <link rel="stylesheet" href="assets/css/app.css">

</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <h3 class="text-center mb-4">

            Rise Craft

        </h3>

        <div class="list-group">

            <a href="dashboard.html"
               class="list-group-item list-group-item-action">

                <i class="bi bi-speedometer2"></i>

                Dashboard

            </a>

            <a href="recipes.html"
               class="list-group-item list-group-item-action active">

                <i class="bi bi-box"></i>

                Recipes

            </a>

        </div>

        <hr>

        <h6 class="text-secondary">

            Craft Professions

        </h6>

        <div id="professionMenu"
             class="list-group mt-3">

        </div>

    </aside>

    <main class="content">

        <div class="topbar d-flex justify-content-between align-items-center">

            <h4 id="selectedProfession">

                Recipe Manager

            </h4>

            <div class="d-flex align-items-center gap-3">

                <span class="badge bg-warning text-dark fs-6">

                    Draft

                    <span id="draftBadge">
                        0
                    </span>

                </span>

                <button
                        id="publishButton"
                        class="btn btn-success"
                        disabled>

                    <i class="bi bi-cloud-upload"></i>

                    Publish

                </button>

            </div>

        </div>

        <div class="container-fluid mt-4">

            <div class="d-flex justify-content-between mb-3">

                <input

                        id="searchInput"

                        class="form-control w-50"

                        placeholder="Recipe Ara">

                <button

                        id="newRecipeButton"

                        class="btn btn-warning">

                    <i class="bi bi-plus-circle"></i>

                    Yeni Recipe

                </button>

            </div>

            <div class="table-responsive">

                <table class="table table-dark table-hover align-middle">

                    <thead>

                    <tr>

                        <th>ID</th>

                        <th>Name</th>

                        <th>Level</th>

                        <th>XP</th>

                        <th>Intermediate</th>

                        <th width="130">

                            İşlem

                        </th>

                    </tr>

                    </thead>

                    <tbody id="recipeTable">

                        <tr>

                            <td colspan="6"
                                class="text-center">

                                Sol menüden meslek seçiniz.

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </main>

</div>
<script src="assets/js/config.js"></script>

<script src="assets/js/store/state.js"></script>

<script src="assets/js/services/auth.service.js"></script>
<script src="assets/js/services/github.service.js"></script>
<script src="assets/js/services/manifest.service.js"></script>
<script src="assets/js/services/profession.service.js"></script>
<script src="assets/js/services/recipe.service.js"></script>
<script src="assets/js/services/publish.service.js"></script>

<script src="assets/js/components/sidebar.js"></script>
<script src="assets/js/components/navbar.js"></script>
<script src="assets/js/components/recipe-table.js"></script>

<script src="assets/js/pages/recipes.js"></script>

</body>

</html>
