<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recipe Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/theme.css">

    <link rel="stylesheet" href="assets/css/app.css">

</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <h3 class="mb-4 text-center">

            Rise Craft

        </h3>

        <div class="list-group">

            <a href="dashboard.html" class="list-group-item list-group-item-action">

                <i class="bi bi-speedometer2"></i>

                Dashboard

            </a>

            <a href="recipes.html" class="list-group-item list-group-item-action active">

                <i class="bi bi-box"></i>

                Recipes

            </a>

        </div>

        <hr>

        <h6 class="text-secondary mt-4">

            Craft Professions

        </h6>

        <div id="professionMenu" class="list-group mt-2">

        </div>

    </aside>

    <main class="content">

        <div class="topbar">

            <h4 id="selectedProfession">

                Recipe Manager

            </h4>

        </div>

        <div class="container-fluid mt-4">

            <div class="d-flex justify-content-between mb-3">

                <input

                        id="searchInput"

                        class="form-control w-50"

                        placeholder="Recipe Ara...">

                <button

                        class="btn btn-warning"

                        id="newRecipeButton">

                    <i class="bi bi-plus-circle"></i>

                    Yeni Recipe

                </button>

            </div>

            <div class="table-responsive">

                <table class="table table-dark table-hover align-middle">

                    <thead>

                    <tr>

                        <th>ID</th>

                        <th>Name</th>

                        <th>Level</th>

                        <th>XP</th>

                        <th>Intermediate</th>

                        <th width="120">İşlem</th>

                    </tr>

                    </thead>

                    <tbody id="recipeTable">

                    <tr>

                        <td colspan="6" class="text-center">

                            Sol menüden bir meslek seçiniz.

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </main>

</div>

<script src="assets/js/config.js"></script>

<script src="assets/js/services/github.service.js"></script>

<script src="assets/js/services/manifest.service.js"></script>

<script src="assets/js/services/profession.service.js"></script>

<script src="assets/js/services/recipe.service.js"></script>

<script src="assets/js/app.js"></script>

<script src="assets/js/sidebar.js"></script>

<script src="assets/js/recipes.js"></script>

</body>

</html>
