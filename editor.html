<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Recipe Editor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="assets/css/theme.css">

<link rel="stylesheet"
href="assets/css/app.css">

</head>

<body>

<div class="layout">

<div id="sidebar"></div>

<div class="content">

<div id="navbar"></div>

<div class="container-fluid mt-4">

<div class="row">

<div class="col-lg-7">

<div class="card-dark p-4">

<h3>Recipe Bilgileri</h3>

<input id="recipeName" class="form-control mb-3" placeholder="Recipe Name">

<input id="recipeId" class="form-control mb-3" placeholder="Recipe ID">

<input id="recipeLevel" class="form-control mb-3" type="number" placeholder="Required Level">

<input id="recipeXp" class="form-control mb-3" type="number" placeholder="XP">

<div class="form-check form-switch">

<input id="intermediate"
class="form-check-input"
type="checkbox">

<label class="form-check-label">

Intermediate

</label>

</div>

<button id="saveBtn"
class="btn btn-warning mt-4">

Kaydet

</button>

</div>

</div>

<div class="col-lg-5">

<div class="card-dark p-4">

<h3>JSON Önizleme</h3>

<pre id="jsonPreview">{ }</pre>

</div>

</div>

</div>

</div>

</div>

</div>

<script src="assets/js/sidebar.js"></script>

<script src="assets/js/editor.js"></script>

</body>

</html>
