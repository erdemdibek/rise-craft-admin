<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recipe Editor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="assets/css/theme.css">
<link rel="stylesheet" href="assets/css/app.css">

</head>

<body>

<div class="layout">

<aside class="sidebar">

<h3>Rise Craft</h3>

</aside>

<main class="content">

<div class="topbar">

<h4>Recipe Editor</h4>

</div>

<div class="container-fluid mt-4">

<div class="row">

<div class="col-lg-7">

<div class="card-dark p-4">

<input id="recipeId" class="form-control mb-3" placeholder="Recipe ID">

<input id="recipeName" class="form-control mb-3" placeholder="Recipe Name">

<input id="recipeLevel" type="number" class="form-control mb-3" placeholder="Required Level">

<input id="recipeXp" type="number" class="form-control mb-3" placeholder="XP">

<div class="form-check form-switch mb-3">

<input id="recipeIntermediate" class="form-check-input" type="checkbox">

<label class="form-check-label">

Intermediate Recipe

</label>

</div>

<hr>

<h5>Materials</h5>

<div id="materialContainer"></div>

<button id="addMaterial" class="btn btn-outline-warning mt-3">

+ Material Ekle

</button>

<hr>

<button id="saveDraft" class="btn btn-warning">

Taslağa Kaydet

</button>

</div>

</div>

<div class="col-lg-5">

<div class="card-dark p-4">

<h5>JSON Preview</h5>

<pre id="jsonPreview"></pre>

</div>

</div>

</div>

</div>

</main>

</div>

<script src="assets/js/components/material-list.js"></script>
<script src="assets/js/utils/json-validator.js"></script>
<script src="assets/js/pages/editor.js"></script>

</body>

</html>
