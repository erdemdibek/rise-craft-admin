<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reçete Düzenle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #10141c; color: #f8f9fa; font-family: system-ui, -apple-system, sans-serif; }
        .form-control { background-color: #1a202c !important; color: #fff !important; border-color: #2d3748 !important; padding: 12px; }
        .touch-btn { min-height: 48px; font-weight: 600; }
        .material-row { background: #161b26; padding: 8px; border-radius: 8px; border: 1px solid #2d3748; }
    </style>
</head>
<body>

<header class="p-3 border-bottom border-secondary d-flex justify-content-between align-items-center bg-dark sticky-top">
    <button id="backBtn" class="btn btn-outline-light btn-sm rounded-pill px-3">
        <i class="bi bi-arrow-left"></i> İptal
    </button>
    <h6 class="mb-0 text-warning fw-bold" id="pageTitle">Reçete Editörü</h6>
    <button id="saveDraft" class="btn btn-success btn-sm rounded-pill px-3 fw-bold">
        <i class="bi bi-check-lg"></i> Kaydet
    </button>
</header>

<main class="container-fluid p-3">
    <form id="recipeForm">
        <div class="mb-3">
            <label class="form-label text-secondary small fw-bold">REÇETE ID</label>
            <input id="recipeId" class="form-control" placeholder="iron_sword_1" autocapitalize="none">
        </div>

        <div class="mb-3">
            <label class="form-label text-secondary small fw-bold">REÇETE ADI</label>
            <input id="recipeName" class="form-control" placeholder="Demir Kılıç">
        </div>

        <div class="row g-2 mb-3">
            <div class="col-6">
                <label class="form-label text-secondary small fw-bold">REQ. LEVEL</label>
                <input id="recipeLevel" type="number" inputmode="numeric" class="form-control" value="1">
            </div>
            <div class="col-6">
                <label class="form-label text-secondary small fw-bold">XP GIVEN</label>
                <input id="recipeXp" type="number" inputmode="numeric" class="form-control" value="0">
            </div>
        </div>

        <div class="form-check form-switch mb-4 fs-5">
            <input id="recipeIntermediate" class="form-check-input" type="checkbox">
            <label class="form-check-label fs-6 text-light pt-1" for="recipeIntermediate">Ara Materyal (Intermediate)</label>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-2">
            <label class="form-label text-warning small fw-bold mb-0">MATERYALLER</label>
            <button type="button" id="addMaterial" class="btn btn-outline-warning btn-sm">
                <i class="bi bi-plus-lg"></i> Materyal Ekle
            </button>
        </div>

        <div id="materialContainer" class="d-flex flex-column gap-2 mb-4">
            <!-- Materyaller JS ile buraya eklenecek -->
        </div>

        <!-- JSON PREVIEW (Mobil Ekranın En Altına Akordeon Olarak) -->
        <details class="mt-4">
            <summary class="text-secondary small cursor-pointer">JSON Önizleme Göster/Gizle</summary>
            <pre id="jsonPreview" class="bg-black text-warning p-3 rounded mt-2 small">{ }</pre>
        </details>
    </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/store/state.js"></script>
<script src="assets/js/services/auth.service.js"></script>
<script src="assets/js/services/github.service.js"></script>
<script src="assets/js/services/manifest.service.js"></script>
<script src="assets/js/services/profession.service.js"></script>
<script src="assets/js/services/recipe.service.js"></script>
<script src="assets/js/services/publish.service.js"></script>

<script src="assets/js/pages/editor.js"></script>
</body>
</html>
