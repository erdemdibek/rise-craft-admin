<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Editor - Rise Craft Studio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/editor.css">
</head>
<body>

<div class="app">

    <!-- MOBILE NAVBAR -->
    <nav class="navbar navbar-dark d-lg-none top-mobile border-bottom">
        <div class="container-fluid px-3">
            <button class="btn btn-outline-warning" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
                <i class="bi bi-list"></i>
            </button>
            <span class="navbar-brand mb-0 h1 fs-6">Recipe Editor</span>
            <button id="publishButton" class="btn btn-warning btn-sm fw-bold">
                <i class="bi bi-cloud-upload"></i>
                <span id="draftBadge" class="badge text-bg-dark ms-1">0</span>
            </button>
        </div>
    </nav>

    <!-- SIDEBAR -->
    <div class="offcanvas-lg offcanvas-start sidebar" tabindex="-1" id="sidebar">
        <div class="offcanvas-header border-bottom">
            <h5 class="text-warning mb-0 fs-6">Rise Craft Studio</h5>
            <button class="btn-close btn-close-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebar"></button>
        </div>

        <div class="offcanvas-body p-0 flex-column d-flex h-100">
            <div class="sidebar-header p-3 text-center border-bottom">
                <div class="logo mb-2">
                    <i class="bi bi-shield-fill fs-2 text-warning"></i>
                </div>
                <h5 class="mb-0">Rise Craft</h5>
                <small class="text-secondary">Admin Studio</small>
            </div>

            <div class="sidebar-menu p-3 flex-grow-1">
                <a href="dashboard.html" class="menu-item d-block p-2 text-decoration-none rounded mb-1">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
                <a href="recipes.html" class="menu-item active d-block p-2 text-decoration-none rounded mb-1">
                    <i class="bi bi-box-seam me-2"></i>Recipes
                </a>
                <hr class="my-3">
                <h6 class="menu-title text-uppercase fs-7 text-secondary px-2">CRAFT PROFESSIONS</h6>
                <div id="professionMenu"></div>
            </div>

            <div class="sidebar-footer p-3 border-top">
                <div class="github-status d-flex align-items-center fs-7">
                    <span class="dot bg-success rounded-circle me-2" style="width: 8px; height: 8px;"></span>
                    GitHub Connected
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="content p-3 p-md-4">
        <header class="topbar d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
            <div>
                <h2 class="h4 mb-1"><i class="bi bi-pencil-square text-warning me-2"></i>Recipe Editor</h2>
                <small class="text-secondary">Rise Craft Companion Data Editor</small>
            </div>

            <div class="d-flex flex-wrap align-items-center gap-2">
                <small id="navbarStatus" class="text-success fw-semibold me-2">● Hazır</small>
                
                <span class="badge text-bg-warning px-2 py-2 d-none d-sm-inline-block">
                    Draft <span id="draftBadgeDesktop">0</span>
                </span>

                <button id="publishButtonDesktop" class="btn btn-warning btn-sm fs-6 px-3 d-none d-lg-inline-block">
                    <i class="bi bi-cloud-upload me-1"></i> Publish
                </button>

                <a href="recipes.html" class="btn btn-outline-light btn-sm fs-6 px-3">
                    <i class="bi bi-arrow-left me-1"></i> Recipes
                </a>

                <button id="saveDraft" class="btn btn-success btn-sm fs-6 px-3">
                    <i class="bi bi-save-fill me-1"></i> Save Draft
                </button>
            </div>
        </header>

        <section class="container-fluid p-0">
            <div class="row g-4">
                <!-- FORM (LEFT) -->
                <div class="col-12 col-xl-7">
                    <div class="editor-card p-3 p-md-4 rounded border">
                        <h5 class="mb-4">General</h5>

                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="recipeId" class="form-label small text-secondary">Recipe ID</label>
                                <input id="recipeId" class="form-control" placeholder="e.g. iron_sword">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="recipeName" class="form-label small text-secondary">Recipe Name</label>
                                <input id="recipeName" class="form-control" placeholder="e.g. Iron Sword">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="recipeLevel" class="form-label small text-secondary">Required Level</label>
                                <input id="recipeLevel" type="number" class="form-control">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="recipeXp" class="form-label small text-secondary">XP Given</label>
                                <input id="recipeXp" type="number" class="form-control">
                            </div>

                            <div class="col-12 pt-2">
                                <div class="form-check form-switch">
                                    <input id="recipeIntermediate" class="form-check-input" type="checkbox">
                                    <label for="recipeIntermediate" class="form-check-label">Intermediate Recipe</label>
                                </div>
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="mb-0">Materials</h5>
                            <button id="addMaterial" class="btn btn-outline-warning btn-sm">
                                <i class="bi bi-plus-circle me-1"></i> Material
                            </button>
                        </div>

                        <div id="materialContainer" class="d-flex flex-column gap-2"></div>
                    </div>
                </div>

                <!-- PREVIEW (RIGHT) -->
                <div class="col-12 col-xl-5">
                    <div class="editor-card p-3 p-md-4 rounded border sticky-top" style="top: 1rem;">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="mb-0 fs-6"><i class="bi bi-code-slash text-warning me-2"></i>JSON Preview</h5>
                            <span class="badge text-bg-success">LIVE</span>
                        </div>
                        <pre id="jsonPreview" class="json-preview bg-dark p-3 rounded mb-0 text-light overflow-auto" style="max-height: 450px;">{ }</pre>
                    </div>
                </div>
            </div>
        </section>
    </main>

</div>

<!-- FLOATING SAVE BUTTON FOR MOBILE -->
<button id="floatingSave" class="btn btn-warning rounded-circle shadow floating-save d-lg-none position-fixed bottom-0 end-0 m-4 p-3 z-3">
    <i class="bi bi-save-fill fs-5"></i>
</button>

<!-- TOAST NOTIFICATION -->
<div class="toast-container position-fixed bottom-0 end-0 p-3 z-3">
    <div id="editorToast" class="toast text-bg-dark border-warning" role="alert">
        <div class="toast-header bg-warning text-dark">
            <strong class="me-auto">Rise Craft</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body" id="toastMessage">
            İşlem tamamlandı.
        </div>
    </div>
</div>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay" class="loading-overlay position-fixed top-0 start-0 w-100 h-100 bg-dark bg-opacity-75 d-flex justify-content-center align-items-center d-none z-3">
    <div class="text-center text-light">
        <div class="spinner-border text-warning mb-3" role="status"></div>
        <h5>Loading...</h5>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/store/state.js"></script>
<script src="assets/js/services/auth.service.js"></script>
<script src="assets/js/services/github.service.js"></script>
<script src="assets/js/services/manifest.service.js"></script>
<script src="assets/js/services/recipe.service.js"></script>
<script src="assets/js/services/publish.service.js"></script>
<script src="assets/js/components/sidebar.js"></script>
<script src="assets/js/components/navbar.js"></script>
<script src="assets/js/components/material-list.js"></script>
<script src="assets/js/pages/editor.js"></script>

<script>
    const floatingSave = document.getElementById("floatingSave");
    if (floatingSave) {
        floatingSave.addEventListener("click", () => {
            document.getElementById("saveDraft")?.click();
        });
    }
</script>

</body>
</html>
