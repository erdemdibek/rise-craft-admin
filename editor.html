<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recipe Editor - Rise Craft Studio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/app.css">
    <style>
        /* Mobil UX Dokunuşları */
        .touch-btn {
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .floating-save {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 58px;
            height: 58px;
            z-index: 1040;
            font-size: 1.4rem;
        }
    </style>
</head>

<body>

<div class="app">

    <!-- MOBILE MENU -->
    <nav class="navbar navbar-dark d-lg-none top-mobile">
        <div class="container-fluid">
            <button class="btn btn-outline-warning touch-btn"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#sidebar">
                <i class="bi bi-list fs-5"></i>
            </button>

            <span class="navbar-brand mb-0 fw-bold">
                Recipe Editor
            </span>

            <button id="publishButton" class="btn btn-warning touch-btn fw-bold">
                <i class="bi bi-cloud-upload me-1"></i>
                <span id="draftBadge" class="badge bg-dark text-warning ms-1">0</span>
            </button>
        </div>
    </nav>

    <!-- SIDEBAR -->
    <div class="offcanvas-lg offcanvas-start sidebar" tabindex="-1" id="sidebar">
        <div class="offcanvas-header">
            <h4 class="text-warning mb-0">Rise Craft Studio</h4>
            <button class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body p-0">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="bi bi-shield-fill"></i>
                </div>
                <h3>Rise Craft</h3>
                <p>Admin Studio</p>
            </div>

            <div class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i class="bi bi-speedometer2"></i>
                    Dashboard
                </a>
                <a href="recipes.html" class="menu-item active">
                    <i class="bi bi-box-seam"></i>
                    Recipes
                </a>
                <hr>
                <h6 class="menu-title">CRAFT PROFESSIONS</h6>
                <div id="professionMenu"></div>
            </div>

            <div class="sidebar-footer">
                <div class="github-status">
                    <span class="dot"></span>
                    GitHub Connected
                </div>
            </div>
        </div>
    </div>

    <!-- CONTENT -->
    <main class="content">
        <header class="topbar d-none d-lg-flex">
            <div>
                <h2 class="mb-1">
                    <i class="bi bi-pencil-square text-warning"></i>
                    Recipe Editor
                </h2>
                <small class="text-secondary">
                    Rise Craft Companion Data Editor
                </small>
            </div>

            <div class="d-flex align-items-center gap-3">
                <small id="navbarStatus" class="text-success fw-semibold">
                    ● Hazır
                </small>

                <span class="badge bg-warning text-dark px-3 py-2">
                    Draft: <span id="draftBadgeDesktop">0</span>
                </span>

                <button id="publishButtonDesktop" class="btn btn-warning">
                    <i class="bi bi-cloud-upload"></i>
                    Publish
                </button>

                <button id="backButton" class="btn btn-outline-light">
                    <i class="bi bi-arrow-left"></i>
                    Recipes
                </button>

                <button id="saveDraft" class="btn btn-success">
                    <i class="bi bi-save-fill me-1"></i>
                    Save Draft
                </button>
            </div>
        </header>

        <section class="container-fluid py-3">
            <div class="row g-4">
                <!-- FORM -->
                <div class="col-xl-7">
                    <div class="editor-card p-3 p-md-4 rounded-3 bg-dark border border-secondary">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="mb-0 text-warning">General Details</h5>
                            <button id="backButtonMobile" class="btn btn-sm btn-outline-light d-lg-none">
                                <i class="bi bi-arrow-left me-1"></i> Geri
                            </button>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-light" for="recipeId">Recipe ID</label>
                                <input id="recipeId" 
                                       class="form-control bg-dark text-white border-secondary" 
                                       placeholder="e.g. iron_sword_1"
                                       autocapitalize="none"
                                       autocomplete="off"
                                       autocorrect="off">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label text-light" for="recipeName">Recipe Name</label>
                                <input id="recipeName" 
                                       class="form-control bg-dark text-white border-secondary" 
                                       placeholder="e.g. Iron Sword">
                            </div>

                            <div class="col-6 col-md-6 mb-3">
                                <label class="form-label text-light" for="recipeLevel">Req. Level</label>
                                <input id="recipeLevel" 
                                       type="number" 
                                       inputmode="numeric" 
                                       min="1" 
                                       class="form-control bg-dark text-white border-secondary" 
                                       value="1">
                            </div>

                            <div class="col-6 col-md-6 mb-3">
                                <label class="form-label text-light" for="recipeXp">XP Given</label>
                                <input id="recipeXp" 
                                       type="number" 
                                       inputmode="numeric" 
                                       min="0" 
                                       class="form-control bg-dark text-white border-secondary" 
                                       value="0">
                            </div>

                            <div class="col-12 my-2">
                                <div class="form-check form-switch fs-5">
                                    <input id="recipeIntermediate" class="form-check-input" type="checkbox">
                                    <label class="form-check-label fs-6 text-light pt-1" for="recipeIntermediate">
                                        Intermediate Recipe
                                    </label>
                                </div>
                            </div>
                        </div>

                        <hr class="my-4 border-secondary">

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="mb-0 text-warning">Materials</h5>
                            <button id="addMaterial" class="btn btn-outline-warning touch-btn px-3">
                                <i class="bi bi-plus-circle me-1"></i> Material Ekle
                            </button>
                        </div>

                        <div id="materialContainer"></div>
                    </div>
                </div>

                <!-- PREVIEW -->
                <div class="col-xl-5">
                    <div class="editor-card p-3 p-md-4 rounded-3 bg-dark border border-secondary sticky-top">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="mb-0 text-light">
                                <i class="bi bi-code-slash text-warning me-2"></i>
                                Live JSON
                            </h5>
                            <span class="badge bg-success">LIVE</span>
                        </div>

                        <pre id="jsonPreview" class="json-preview bg-black text-warning p-3 rounded border border-secondary fs-6 mb-0" style="max-height: 350px; overflow-y: auto;">{ }</pre>
                    </div>
                </div>
            </div>
        </section>
    </main>

</div>

<!-- MOBİLDE HER AN ERİŞİLEBİLİR YÜZEN KAYDET BUTONU -->
<button id="floatingSave" class="btn btn-warning rounded-circle shadow floating-save touch-btn d-lg-none">
    <i class="bi bi-save-fill"></i>
</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="assets/js/config.js"></script>
<script src="assets/js/store/state.js"></script>

<script src="assets/js/services/auth.service.js"></script>
<script src="assets/js/services/github.service.js"></script>
<script src="assets/js/services/manifest.service.js"></script>
<script src="assets/js/services/profession.service.js"></script>
<script src="assets/js/services/recipe.service.js"></script>
<script src="assets/js/services/publish.service.js"></script>

<script src="assets/js/components/sidebar.js"></script>
<script src="assets/js/components/navbar.js"></script>

<script src="assets/js/pages/editor.js"></script>

</body>
</html>
